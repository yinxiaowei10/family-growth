<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打印每周打卡表 - 暑假冒险岛</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <div class="app-container">
    <div class="no-print" style="margin-bottom: 16px; text-align: center;">
      <button class="btn btn-primary" onclick="window.print()">🖨️ 打印本页</button>
      <a href="stats.html" class="btn btn-secondary">返回</a>
    </div>

    <h1 class="text-center">🌴 暑假冒险岛 · 每周打卡表</h1>
    <p class="text-center" style="color: var(--muted-color);">第 <span id="print-week">____</span> 周（____月____日 — ____月____日）</p>

    <div id="print-tables">
      <!-- Tables will be generated by JS -->
    </div>

    <div class="paper-card no-print">
      <h3>使用说明</h3>
      <ul>
        <li>每天完成后在对应格子里打勾</li>
        <li>桐桐每天必做 6 项，松松每天必做 3 项</li>
        <li>周末家长和孩子一起复盘本周完成情况</li>
      </ul>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    function generateWeeklyTable(childId) {
      const child = CHILDREN[childId];
      const tasks = TASKS[childId];
      const weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

      let html = `
        <h2>${child.name} · ${child.character} ${child.characterDesc}</h2>
        <table class="print-weekly-table">
          <thead>
            <tr>
              <th>任务</th>
              ${weekdays.map((d) => `<th>${d}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
      `;

      tasks.forEach((task) => {
        html += `
          <tr>
            <td>${task.icon} ${task.text}</td>
            ${weekdays.map(() => `
              <td>
                <div class="print-task-row">
                  <span class="print-check"></span>
                </div>
              </td>
            `).join('')}
          </tr>
        `;
      });

      html += '</tbody></table>';
      return html;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('print-tables');
      container.innerHTML = generateWeeklyTable('tongtong') + '<div class="page-break"></div>' + generateWeeklyTable('songsong');
    });
  </script>
</body>
</html>
