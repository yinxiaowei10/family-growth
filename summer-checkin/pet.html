<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6B5B95">
  <title>我的宠物 · 成长星球</title>
  <script>
    (function() {
      const theme = localStorage.getItem('growthPlanetTheme') || 'theme-default';
      document.documentElement.className = theme;
    })();
  </script>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/theme-switcher.css">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <style>
    .pet-page {
      text-align: center;
    }
    .pet-container {
      background: var(--paper-color);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .pet-emoji {
      font-size: 8rem;
      line-height: 1;
      margin-bottom: 12px;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .pet-name {
      font-family: var(--font-hand);
      font-size: 1.6rem;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .pet-stage {
      color: var(--muted-color);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .level-badge {
      display: inline-block;
      background: var(--accent-yellow);
      border: 2px solid var(--border-color);
      border-radius: 50px;
      padding: 6px 16px;
      font-family: var(--font-hand);
      font-weight: bold;
      margin-bottom: 16px;
    }
    .xp-bar {
      width: 100%;
      height: 14px;
      background: #E0E0E0;
      border-radius: 7px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1px solid var(--border-color);
    }
    .xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-green), #66BB6A);
      border-radius: 7px;
      transition: width 0.5s ease;
    }
    .xp-text {
      font-size: 0.8rem;
      color: var(--muted-color);
      margin-bottom: 16px;
    }
    .pet-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }
    .pet-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pet-stat-value {
      font-family: var(--font-hand);
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent-orange);
    }
    .pet-stat-label {
      font-size: 0.75rem;
      color: var(--muted-color);
    }
    .feed-btn {
      font-size: 1.2rem;
      padding: 14px 32px;
    }
    .feed-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .level-up-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fade-in 0.3s ease;
    }
    .level-up-content {
      background: var(--paper-color);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      max-width: 300px;
      width: 90%;
      box-shadow: var(--shadow);
      animation: pop-in 0.4s ease;
    }
    .level-up-emoji {
      font-size: 5rem;
      margin-bottom: 12px;
    }
    .growth-log {
      text-align: left;
    }
    .growth-log-item {
      padding: 8px 0;
      border-bottom: 1px dashed var(--border-color);
      font-size: 0.9rem;
    }
  </style>
</head>
<body class="pet-page">
  <div class="app-container page-content">
    <div class="paper-card">
      <h1 class="text-center">🐣 我的宠物</h1>

      <div class="tabs">
        <button class="tab active" data-child="tongtong">桐桐</button>
        <button class="tab" data-child="songsong">松松</button>
      </div>

      <div class="pet-container">
        <div id="pet-emoji" class="pet-emoji">🥚</div>
        <div id="pet-name" class="pet-name">泡泡龙</div>
        <div id="pet-stage" class="pet-stage">蛋蛋阶段</div>
        <div id="level-badge" class="level-badge">Lv.1</div>

        <div class="xp-bar">
          <div id="xp-fill" class="xp-fill" style="width: 0%"></div>
        </div>
        <div id="xp-text" class="xp-text">0 / 20 XP</div>

        <div class="pet-stats">
          <div class="pet-stat">
            <div id="food-value" class="pet-stat-value">0</div>
            <div class="pet-stat-label">可用宠物粮</div>
          </div>
          <div class="pet-stat">
            <div id="total-food-value" class="pet-stat-value">0</div>
            <div class="pet-stat-label">累计获得</div>
          </div>
        </div>

        <button id="feed-btn" class="btn btn-primary feed-btn" onclick="handleFeed()">
          🌾 喂宠物（-10 粮）
        </button>
        <p class="text-center mt-1" style="font-size: 0.75rem; color: var(--muted-color);">完成打卡可获得宠物粮，每喂一次 +10 经验</p>
      </div>

      <div class="paper-card growth-log">
        <h2 class="text-center">📖 成长日记</h2>
        <div id="growth-log">
          <div class="growth-log-item">还没有成长记录，快去喂宠物吧~</div>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.html">
      <span class="nav-icon">🪐</span>
      <span>星球</span>
    </a>
    <a href="checkin.html">
      <span class="nav-icon">📝</span>
      <span>今日</span>
    </a>
    <a href="badges.html">
      <span class="nav-icon">🎖️</span>
      <span>勋章</span>
    </a>
    <a href="stats.html">
      <span class="nav-icon">📈</span>
      <span>战绩</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pet.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderPetPage();

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
          tab.classList.add('active');
          renderPetPage();
        });
      });
    });
  </script>
</body>
</html>
