<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6B5B95">
  <title>成长星球</title>
  <script>
    (function() {
      const theme = localStorage.getItem('growthPlanetTheme') || 'theme-default';
      document.documentElement.className = theme;
    })();
  </script>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/portal.css">
  <link rel="stylesheet" href="css/theme-switcher.css">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
</head>
<body class="portal-page">
  <div class="stars"></div>
  <div class="app-container">
    <div class="portal-hero">
      <div class="planet-ring">
        <div class="planet">
          <span class="planet-emoji">🪐</span>
        </div>
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
      </div>
      <h1 class="portal-title">成长星球</h1>
      <p class="portal-subtitle">桐桐和松松的成长小宇宙</p>
    </div>

    <div class="portal-section">
      <h2 class="portal-section-title">🚀 开始探索</h2>
      <a href="island.html" class="module-card active">
        <div class="module-icon">🏝️</div>
        <div class="module-info">
          <div class="module-name">夏日冒险岛</div>
          <div class="module-desc">暑假打卡 · 冒险地图 · 徽章奖励</div>
        </div>
        <div class="module-arrow">▶</div>
      </a>
    </div>

    <div class="portal-section" id="today-snapshot">
      <h2 class="portal-section-title">✨ 今日能量</h2>
      <div class="snapshot-grid">
        <div class="empty-state" style="padding: 16px;">
          <p>今日进度加载中...</p>
        </div>
      </div>
    </div>

    <div class="portal-section">
      <h2 class="portal-section-title">🔒 即将开启</h2>
      <div class="module-card locked">
        <div class="module-icon">📚</div>
        <div class="module-info">
          <div class="module-name">阅读星球</div>
          <div class="module-desc">正在建设中...</div>
        </div>
        <div class="module-lock">🔒</div>
      </div>
      <div class="module-card locked">
        <div class="module-icon">🏃</div>
        <div class="module-info">
          <div class="module-name">运动大陆</div>
          <div class="module-desc">正在建设中...</div>
        </div>
        <div class="module-lock">🔒</div>
      </div>
    </div>

    <div class="portal-section theme-section">
      <h2 class="portal-section-title">🎨 主题切换</h2>
      <div id="theme-selector" class="theme-selector">
        <div class="empty-state" style="padding: 16px;">
          <p>主题加载中...</p>
        </div>
      </div>
    </div>

    <div class="portal-footer">
      <p>完成每日小任务，收集成长能量 ✨</p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
