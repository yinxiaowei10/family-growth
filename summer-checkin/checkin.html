<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFB347">
  <title>每日打卡 · 成长星球</title>
  <script>
    (function() {
      const theme = localStorage.getItem('growthPlanetTheme') || 'theme-default';
      document.documentElement.className = theme;
    })();
  </script>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/theme-switcher.css">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
</head>
<body class="theme-tongtong">
  <div class="app-container page-content">
    <div class="paper-card">
      <h1 class="text-center">📝 每日打卡</h1>

      <div class="date-picker">
        <button class="btn btn-small" id="prev-date">◀</button>
        <input type="date" id="checkin-date">
        <button class="btn btn-small" id="next-date">▶</button>
      </div>

      <div class="tabs">
        <button class="tab active" data-child="tongtong">桐桐</button>
        <button class="tab" data-child="songsong">松松</button>
      </div>

      <div class="progress-ring">
        <svg width="120" height="120">
          <circle class="progress-ring-bg" cx="60" cy="60" r="52"></circle>
          <circle class="progress-ring-fill" cx="60" cy="60" r="52"></circle>
        </svg>
        <div class="progress-text">0%</div>
      </div>
    </div>

    <div id="plan-container">
      <!-- 时段计划卡片由 JS 渲染 -->
    </div>

    <div class="paper-card activity-library-card">
      <div class="section-header">
        <h2 class="text-center">🎯 活动卡片库</h2>
        <p class="text-center hint">
          点卡片加入「<span id="selected-period-label">上午</span>」
        </p>
      </div>
      <div id="activity-library" class="activity-library">
        <div class="empty-state">
          <p>活动库加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="guess-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 class="guess-modal-title">你觉得要多久？</h3>
      <p class="guess-modal-subtitle">先猜一猜，做完再看准不准</p>
      <div class="time-presets"></div>
      <input type="number" id="guess-minutes-input" class="modal-input" placeholder="自定义分钟数" min="0">
      <div class="modal-actions">
        <button type="button" class="btn" id="cancel-guess">取消</button>
        <button type="button" class="btn btn-primary" id="confirm-guess">确定</button>
      </div>
    </div>
  </div>

  <div id="time-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 class="time-modal-title">实际用了多久？</h3>
      <p class="time-modal-estimate"></p>
      <div class="time-presets"></div>
      <input type="number" id="actual-minutes-input" class="modal-input" placeholder="自定义分钟数" min="0">
      <div class="modal-actions">
        <button type="button" class="btn" id="uncomplete-task">取消完成</button>
        <button type="button" class="btn" id="cancel-time">取消</button>
        <button type="button" class="btn btn-secondary" id="skip-time">按预估</button>
        <button type="button" class="btn btn-primary" id="confirm-time">完成打卡</button>
      </div>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.html">
      <span class="nav-icon">🪐</span>
      <span>星球</span>
    </a>
    <a href="checkin.html" class="active">
      <span class="nav-icon">📝</span>
      <span>今日</span>
    </a>
    <a href="badges.html">
      <span class="nav-icon">🎖️</span>
      <span>勋章</span>
    </a>
    <a href="stats.html">
      <span class="nav-icon">📈</span>
      <span>战绩</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/checkin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const childFromUrl = urlParams.get('child');
      const dateInput = document.getElementById('checkin-date');

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.classList.remove('active');
        if (tab.dataset.child === (childFromUrl || 'tongtong')) {
          tab.classList.add('active');
        }
      });

      dateInput.value = getToday();

      document.getElementById('prev-date').addEventListener('click', () => {
        const d = new Date(dateInput.value);
        d.setDate(d.getDate() - 1);
        dateInput.value = formatDate(d);
        dateInput.dispatchEvent(new Event('change'));
      });

      document.getElementById('next-date').addEventListener('click', () => {
        const d = new Date(dateInput.value);
        d.setDate(d.getDate() + 1);
        dateInput.value = formatDate(d);
        dateInput.dispatchEvent(new Event('change'));
      });

      renderCheckinPage();

      document.getElementById('confirm-guess').addEventListener('click', confirmGuessModal);
      document.getElementById('cancel-guess').addEventListener('click', closeGuessModal);
      document.getElementById('confirm-time').addEventListener('click', confirmTimeModal);
      document.getElementById('skip-time').addEventListener('click', skipTimeModal);
      document.getElementById('cancel-time').addEventListener('click', closeTimeModal);
      document.getElementById('uncomplete-task').addEventListener('click', uncompleteTask);
    });
  </script>
</body>
</html>
