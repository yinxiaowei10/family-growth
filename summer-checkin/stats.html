<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFB347">
  <title>数据统计 · 成长星球</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
</head>
<body>
  <div class="app-container page-content">
    <div class="paper-card">
      <h1 class="text-center">📊 数据统计</h1>

      <div class="tabs">
        <button class="tab active" id="stats-child-select" data-value="tongtong" onclick="switchStatsChild('tongtong')">桐桐</button>
        <button class="tab" onclick="switchStatsChild('songsong')">松松</button>
      </div>

      <div id="stats-container">
        <div class="empty-state">
          <p>数据加载中...</p>
        </div>
      </div>
    </div>

    <div class="paper-card">
      <h2 class="text-center">📦 数据导出 / 导入</h2>
      <p class="text-center" style="font-size: 0.85rem; color: var(--muted-color);">导出 JSON/CSV 可用于备份或进一步分析</p>
      <div class="export-buttons">
        <button class="btn btn-primary" id="export-json">导出 JSON</button>
        <button class="btn btn-secondary" id="export-csv">导出 CSV</button>
      </div>
      <div class="mt-2 text-center">
        <input type="file" id="import-file" accept=".json" style="display: none;">
        <button class="btn btn-small" onclick="document.getElementById('import-file').click()">选择 JSON 备份</button>
        <button class="btn btn-small" id="import-json">导入</button>
      </div>
    </div>

    <div class="paper-card text-center">
      <a href="print.html" class="btn btn-primary">🖨️ 打印每周打卡表</a>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.html">
      <span class="nav-icon">🪐</span>
      <span>星球</span>
    </a>
    <a href="checkin.html">
      <span class="nav-icon">✅</span>
      <span>打卡</span>
    </a>
    <a href="badges.html">
      <span class="nav-icon">🏅</span>
      <span>徽章</span>
    </a>
    <a href="stats.html" class="active">
      <span class="nav-icon">📊</span>
      <span>数据</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/stats.js"></script>
  <script>
    let currentStatsChild = 'tongtong';

    function switchStatsChild(childId) {
      currentStatsChild = childId;
      document.querySelectorAll('.tab').forEach((tab, index) => {
        tab.classList.toggle('active', (childId === 'tongtong' && index === 0) || (childId === 'songsong' && index === 1));
      });
      const records = getRecords();
      renderStatsForChild(childId, records, document.getElementById('stats-container'));
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderStatsPage();
    });
  </script>
</body>
</html>
